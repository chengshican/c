<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 游戏数据查看器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .card {
            background: rgba(255,255,255,0.95);
            color: #333;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card h2 {
            margin-top: 0;
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .info-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .info-item .value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button.danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        button.success {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }
        button.warning {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .data-table th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }
        .data-table tr:hover {
            background: #f5f5f5;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-success { background: #2ecc71; color: white; }
        .badge-info { background: #3498db; color: white; }
        .badge-warning { background: #f39c12; color: white; }
        .badge-danger { background: #e74c3c; color: white; }
        .code-block {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .alert-info {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            color: #0c5460;
        }
        .alert-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
        }
        .alert-danger {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }
        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 游戏数据查看器</h1>
        <p class="subtitle">查看和管理《三国英雄传》的游戏数据</p>
        
        <!-- 存储信息卡片 -->
        <div class="card">
            <h2>💾 存储信息</h2>
            <div class="alert alert-info">
                <strong>📍 数据存储位置：</strong>浏览器的 localStorage<br>
                <strong>✅ 数据持久化：</strong>关闭浏览器后数据不会丢失，永久保存
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <label>存储类型</label>
                    <div class="value">localStorage</div>
                </div>
                <div class="info-item">
                    <label>存储前缀</label>
                    <div class="value">sanguo_idle_</div>
                </div>
                <div class="info-item">
                    <label>容量限制</label>
                    <div class="value">5MB</div>
                </div>
                <div class="info-item">
                    <label>数据有效期</label>
                    <div class="value">永久</div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <strong>📊 存储空间使用情况：</strong>
                <div class="progress-bar">
                    <div class="progress-fill" id="storage-usage">计算中...</div>
                </div>
            </div>
        </div>
        
        <!-- 账号列表卡片 -->
        <div class="card">
            <h2>👥 账号列表</h2>
            <div id="accounts-section">
                <p>加载中...</p>
            </div>
        </div>
        
        <!-- 玩家数据详情 -->
        <div class="card">
            <h2>📋 玩家数据详情</h2>
            <div class="info-grid">
                <button onclick="loadAllData()">🔄 刷新所有数据</button>
                <button class="success" onclick="exportAllData()">💾 导出数据</button>
                <button class="warning" onclick="clearCache()">🗑️ 清除缓存</button>
                <button class="danger" onclick="clearAllData()">⚠️ 删除所有数据</button>
            </div>
            <div id="player-data-section">
                <p>请选择一个账号查看详情</p>
            </div>
        </div>
        
        <!-- 原始数据查看 -->
        <div class="card">
            <h2>📝 原始数据 (JSON)</h2>
            <div class="alert alert-warning">
                <strong>⚠️ 警告：</strong>不要随意修改这些数据，可能导致游戏数据损坏！
            </div>
            <textarea id="raw-data-editor" class="code-block" style="width: 100%; min-height: 300px; font-family: monospace;" placeholder="选择一个账号查看原始数据..."></textarea>
        </div>
    </div>

    <script>
        let allAccounts = [];
        let currentAccount = null;

        // 页面加载时初始化
        window.onload = function() {
            loadAccounts();
            calculateStorageUsage();
        };

        // 计算存储空间使用
        function calculateStorageUsage() {
            let totalSize = 0;
            for (let key in localStorage) {
                if (localStorage.hasOwnProperty(key)) {
                    totalSize += localStorage[key].length + key.length;
                }
            }
            
            const totalBytes = totalSize * 2; // UTF-16 编码
            const totalKB = (totalBytes / 1024).toFixed(2);
            const totalMB = (totalBytes / 1024 / 1024).toFixed(2);
            const usagePercent = ((totalBytes / 1024 / 1024) * 100 / 5).toFixed(1);
            
            const usageEl = document.getElementById('storage-usage');
            usageEl.style.width = Math.min(usagePercent, 100) + '%';
            usageEl.textContent = `${totalMB} KB (${usagePercent}% of 5MB)`;
            
            if (usagePercent > 80) {
                usageEl.style.background = 'linear-gradient(90deg, #e74c3c 0%, #c0392b 100%)';
            } else if (usagePercent > 50) {
                usageEl.style.background = 'linear-gradient(90deg, #f39c12 0%, #e67e22 100%)';
            }
        }

        // 加载账号列表
        function loadAccounts() {
            try {
                const accountsData = localStorage.getItem('sanguo_accounts');
                allAccounts = accountsData ? JSON.parse(accountsData) : [];
                
                const section = document.getElementById('accounts-section');
                
                if (allAccounts.length === 0) {
                    section.innerHTML = '<div class="alert alert-warning">暂无账号数据</div>';
                    return;
                }
                
                let html = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>账号名</th>
                                <th>创建时间</th>
                                <th>最后登录</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                allAccounts.forEach(acc => {
                    const playerData = JSON.parse(localStorage.getItem('sanguo_idle_' + acc.username) || '{}');
                    const hasData = Object.keys(playerData).length > 0;
                    
                    html += `
                        <tr>
                            <td><strong>${acc.username}</strong></td>
                            <td>${new Date(acc.createdAt).toLocaleString('zh-CN')}</td>
                            <td>${new Date(acc.lastLogin).toLocaleString('zh-CN')}</td>
                            <td>
                                <button class="badge badge-info" onclick="viewAccount('${acc.username}')">查看详情</button>
                                ${hasData ? `<span class="badge badge-success">有数据</span>` : `<span class="badge badge-danger">无数据</span>`}
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table>';
                section.innerHTML = html;
                
            } catch (e) {
                document.getElementById('accounts-section').innerHTML = 
                    `<div class="alert alert-danger">加载失败：${e.message}</div>`;
            }
        }

        // 查看账号详情
        function viewAccount(username) {
            try {
                currentAccount = username;
                const playerData = JSON.parse(localStorage.getItem('sanguo_idle_' + username) || '{}');
                
                const section = document.getElementById('player-data-section');
                
                if (Object.keys(playerData).length === 0) {
                    section.innerHTML = '<div class="alert alert-warning">该账号暂无游戏数据</div>';
                    document.getElementById('raw-data-editor').value = '{}';
                    return;
                }
                
                let html = `
                    <div class="info-grid">
                        <div class="info-item">
                            <label>账号名</label>
                            <div class="value">${username}</div>
                        </div>
                        <div class="info-item">
                            <label>等级</label>
                            <div class="value">Lv.${playerData.level || 1}</div>
                        </div>
                        <div class="info-item">
                            <label>经验值</label>
                            <div class="value">${formatNumber(playerData.exp || 0)}</div>
                        </div>
                        <div class="info-item">
                            <label>金币</label>
                            <div class="value">💰 ${formatNumber(playerData.gold || 0)}</div>
                        </div>
                        <div class="info-item">
                            <label>元宝</label>
                            <div class="value">💎 ${formatNumber(playerData.gem || 0)}</div>
                        </div>
                        <div class="info-item">
                            <label>当前关卡</label>
                            <div class="value">第${playerData.currentLevel || 1}关</div>
                        </div>
                        <div class="info-item">
                            <label>武将数量</label>
                            <div class="value">${playerData.heroes ? playerData.heroes.length : 0} 个</div>
                        </div>
                        <div class="info-item">
                            <label>装备数量</label>
                            <div class="value">${playerData.inventory ? playerData.inventory.length : 0} 件</div>
                        </div>
                    </div>
                    
                    <h3>📊 统计信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>战斗胜利</label>
                            <div class="value">${playerData.stats?.battleWin || 0} 场</div>
                        </div>
                        <div class="info-item">
                            <label>招募次数</label>
                            <div class="value">${playerData.stats?.summonCount || 0} 次</div>
                        </div>
                        <div class="info-item">
                            <label>挂机战斗</label>
                            <div class="value">${playerData.stats?.afkBattles || 0} 场</div>
                        </div>
                        <div class="info-item">
                            <label>总伤害</label>
                            <div class="value">${formatNumber(playerData.stats?.totalDamage || 0)}</div>
                        </div>
                    </div>
                `;
                
                if (playerData.heroes && playerData.heroes.length > 0) {
                    html += `
                        <h3>⚔️ 武将列表 (${playerData.heroes.length})</h3>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>等级</th>
                                    <th>星级</th>
                                    <th>HP</th>
                                    <th>攻击</th>
                                    <th>防御</th>
                                    <th>速度</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    playerData.heroes.forEach(hero => {
                        html += `
                            <tr>
                                <td><strong>${hero.name || hero.id}</strong></td>
                                <td>Lv.${hero.level || 1}</td>
                                <td>${'⭐'.repeat(hero.star || 0)}</td>
                                <td>${hero.hp || 0}</td>
                                <td>${hero.attack || 0}</td>
                                <td>${hero.defense || 0}</td>
                                <td>${hero.speed || 0}</td>
                            </tr>
                        `;
                    });
                    
                    html += '</tbody></table>';
                }
                
                section.innerHTML = html;
                
                // 显示原始数据
                document.getElementById('raw-data-editor').value = JSON.stringify(playerData, null, 2);
                
            } catch (e) {
                document.getElementById('player-data-section').innerHTML = 
                    `<div class="alert alert-danger">加载失败：${e.message}</div>`;
            }
        }

        // 加载所有数据
        function loadAllData() {
            loadAccounts();
            calculateStorageUsage();
            if (currentAccount) {
                viewAccount(currentAccount);
            }
            alert('✅ 数据已刷新');
        }

        // 导出所有数据
        function exportAllData() {
            const backup = {};
            for (let key in localStorage) {
                if (localStorage.hasOwnProperty(key) && key.startsWith('sanguo_')) {
                    backup[key] = localStorage.getItem(key);
                }
            }
            
            const jsonString = JSON.stringify(backup, null, 2);
            const blob = new Blob([jsonString], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sanguo_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('✅ 数据已导出到下载文件夹');
        }

        // 清除缓存
        function clearCache() {
            if (confirm('确定要清除缓存吗？这将清除所有游戏数据！')) {
                localStorage.clear();
                alert('✅ 缓存已清除，页面将刷新');
                location.reload();
            }
        }

        // 删除所有数据
        function clearAllData() {
            if (confirm('⚠️ 警告：此操作将永久删除所有游戏数据，无法恢复！\n\n确定要继续吗？')) {
                localStorage.clear();
                alert('✅ 所有数据已删除');
                location.reload();
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 100000000) return (num / 100000000).toFixed(2) + '亿';
            if (num >= 10000) return (num / 10000).toFixed(1) + '万';
            return num.toString();
        }
    </script>
</body>
</html>
