<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除存档 - 三国英雄传</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: left;
        }
        .warning strong {
            color: #856404;
        }
        .info {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: left;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #868f96 0%, #596164 100%);
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .save-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
        }
        .save-info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 清除游戏存档</h1>
        
        <div class="info">
            <strong>💡 提示:</strong> 如果您无法开始游戏，可以尝试清除存档重新开始。
        </div>
        
        <div class="save-info" id="saveInfo">
            正在检查存档...
        </div>
        
        <div class="warning">
            <strong>⚠️ 警告:</strong> 清除存档后，所有游戏进度将永久丢失，包括:
            <ul style="margin: 10px 0 0 20px;">
                <li>所有武将和阵容</li>
                <li>金币和元宝</li>
                <li>成就和任务进度</li>
                <li>所有物品和装备</li>
            </ul>
        </div>
        
        <div>
            <button class="btn btn-danger" onclick="clearSave()">🗑️ 清除存档</button>
            <button class="btn btn-success" onclick="startNewGame()">🎮 开始新游戏</button>
            <button class="btn btn-secondary" onclick="backToGame()">↩️ 返回游戏</button>
        </div>
        
        <div class="status" id="status"></div>
    </div>
    
    <script>
        // 检查存档
        window.onload = function() {
            const save = localStorage.getItem('sanguo_idle_save');
            const saveInfo = document.getElementById('saveInfo');
            
            if (save) {
                try {
                    const data = JSON.parse(save);
                    const heroCount = data.heroes ? data.heroes.length : 0;
                    const teamCount = data.team ? data.team.length : 0;
                    
                    saveInfo.innerHTML = `
                        <strong>✅ 检测到存档:</strong><br>
                        等级：${data.level || 1}<br>
                        金币：${data.gold || 0}<br>
                        元宝：${data.gem || 0}<br>
                        武将数量：${heroCount}<br>
                        阵容人数：${teamCount}<br>
                        登录天数：${data.stats?.loginDays || 1}
                    `;
                } catch (e) {
                    saveInfo.innerHTML = `
                        <strong>⚠️ 存档可能已损坏:</strong><br>
                        建议清除存档重新开始
                    `;
                }
            } else {
                saveInfo.innerHTML = `
                    <strong>ℹ️ 没有存档:</strong><br>
                    点击下方"开始新游戏"按钮即可开始
                `;
            }
        };
        
        // 清除存档
        function clearSave() {
            if (confirm('确定要清除存档吗？这将永久删除所有游戏进度！')) {
                localStorage.removeItem('sanguo_idle_save');
                showStatus('✅ 存档已清除！刷新页面后开始新游戏。', 'success');
                
                setTimeout(() => {
                    startNewGame();
                }, 1500);
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            localStorage.removeItem('sanguo_idle_save');
            showStatus('✅ 准备开始新游戏...', 'success');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }
        
        // 返回游戏
        function backToGame() {
            window.location.href = 'index.html';
        }
        
        // 显示状态
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>
