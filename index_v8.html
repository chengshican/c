<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 三国英雄传 v1.0 - 20 关剧情版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a2e; color: white; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #game-canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow-y: auto; }
        .screen { position: absolute; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.3s; overflow-y: auto; }
        .screen.active { opacity: 1; pointer-events: auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .player-info { display: flex; gap: 15px; font-size: 15px; font-weight: bold; align-items: center; }
        .main-content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin: 5px; font-weight: bold; pointer-events: auto; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-info { background: #1abc9c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-sm { padding: 8px 15px; font-size: 14px; }
        .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .team-display { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; pointer-events: auto; }
        .modal.show { display: flex; }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .daily-quests { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-top: 20px; }
        .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; pointer-events: auto; }
        
        /* 战斗特效动画 */
        @keyframes attack-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) scale(1.1); }
            75% { transform: translateX(10px) scale(1.1); }
        }
        @keyframes damage-flash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(2) hue-rotate(20deg); }
        }
        @keyframes skill-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.5); }
            50% { box-shadow: 0 0 30px rgba(255,200,0,0.8); }
        }
        @keyframes hp-bar-change {
            0% { width: 100%; }
            50% { width: 80%; background: #e74c3c; }
            100% { width: var(--target-width); background: #2ecc71; }
        }
        @keyframes float-text {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
        @keyframes card-flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }
        @keyframes card-shine {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }
        @keyframes critical-hit {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        @keyframes slash-effect {
            0% { width: 0; opacity: 0; }
            50% { width: 200px; opacity: 1; }
            100% { width: 0; opacity: 0; }
        }
        @keyframes explosion {
            0% { transform: scale(0.5); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        @keyframes shake-screen {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px); }
            20% { transform: translate(5px, 5px); }
            30% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
        }
        .attack-anim { animation: attack-shake 0.5s ease-in-out; }
        .damage-anim { animation: damage-flash 0.3s ease-in-out; }
        .skill-anim { animation: skill-glow 0.6s ease-in-out; }
        .critical-anim {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #f39c12;
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.8);
            animation: critical-hit 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 200;
        }
        .float-damage { 
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: float-text 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        .float-heal {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            animation: float-text 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        .float-critical {
            position: absolute;
            font-size: 36px;
            font-weight: bold;
            color: #f39c12;
            text-shadow: 0 0 20px rgba(243, 156, 18, 1);
            animation: float-text 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 150;
        }
        .slash {
            position: absolute;
            height: 5px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            border-radius: 5px;
            animation: slash-effect 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 120;
        }
        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #f39c12, #e74c3c, transparent);
            animation: explosion 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 110;
        }
        .shake-anim {
            animation: shake-screen 0.5s ease-in-out;
        }
        .summon-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 200% 200%;
            animation: card-shine 2s ease-in-out infinite;
        }
        @keyframes slideDown {
            0% { transform: translate(-50%, -100px); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes slideUp {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -100px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer"></div>
    </div>
    
    <script src="game_v8_complete.js"></script>
</body>
</html>
