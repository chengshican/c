<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 三国英雄传 - 可玩性测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a2e;
            color: white;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-info {
            display: flex;
            gap: 20px;
            font-size: 18px;
        }
        .main-content {
            padding: 20px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            pointer-events: auto;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
        }
        .help-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            z-index: 1000;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer"></div>
    </div>
    
    <button class="help-btn" onclick="showHelp()">❓</button>
    
    <script>
        // 游戏核心
        const Game = {
            canvas: null,
            ctx: null,
            ui: null,
            player: {
                level: 1,
                gold: 1000,
                gem: 100,
                heroes: [],
                team: []
            },
            state: { screen: 'home' },
            
            init() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.ui = document.getElementById('ui-layer');
                this.resize();
                
                // 初始武将
                this.player.heroes.push({
                    id: 'zhaolei',
                    name: '赵累',
                    hp: 150,
                    attack: 35,
                    defense: 25,
                    speed: 20,
                    level: 1
                });
                this.player.team = ['zhaolei'];
                
                this.setupUI();
                this.render();
                
                console.log('✅ 游戏初始化成功！');
            },
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            
            setupUI() {
                this.ui.innerHTML = `
                    <div id="home-screen" class="screen active">
                        <div class="header">
                            <div class="player-info">
                                <span>Lv.${this.player.level}</span>
                                <span>💰 ${this.player.gold}</span>
                                <span>💎 ${this.player.gem}</span>
                            </div>
                        </div>
                        <div class="main-content" style="text-align: center; margin-top: 50px;">
                            <h1 style="font-size: 48px; margin-bottom: 30px;">🎮 三国英雄传</h1>
                            <p style="font-size: 20px; margin-bottom: 40px; color: #aaa;">点击下面的按钮开始游戏</p>
                            
                            <button class="btn btn-primary" onclick="startBattle()">⚔️ 快速战斗</button>
                            <button class="btn btn-success" onclick="showSummon()">🎴 招募武将</button>
                            <button class="btn btn-info" onclick="showHeroList()">👥 武将列表</button>
                            
                            <div style="margin-top: 50px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 15px;">
                                <h3 style="margin-bottom: 15px;">📖 快速开始</h3>
                                <p style="text-align: left; line-height: 1.8;">
                                    1️⃣ <b>快速战斗</b> - 点击开始战斗，获得金币和经验<br>
                                    2️⃣ <b>招募武将</b> - 抽取更多强力武将<br>
                                    3️⃣ <b>武将列表</b> - 查看和培养你的武将
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="battle-screen" class="screen">
                        <div class="header">
                            <button class="btn btn-danger" onclick="backToHome()" style="padding: 10px 20px;">← 返回</button>
                            <h2>⚔️ 战斗中</h2>
                        </div>
                        <div class="main-content" style="text-align: center; margin-top: 100px;">
                            <h1 style="font-size: 36px; margin-bottom: 20px;">️ 战斗进行中...</h1>
                            <p style="font-size: 24px; margin-bottom: 30px;">胜利！获得 💰50</p>
                            <button class="btn btn-primary" onclick="backToHome()">✅ 继续</button>
                        </div>
                    </div>
                    
                    <div id="summon-screen" class="screen">
                        <div class="header">
                            <button class="btn btn-danger" onclick="backToHome()" style="padding: 10px 20px;">← 返回</button>
                            <h2>🎴 招募武将</h2>
                        </div>
                        <div class="main-content" style="text-align: center; margin-top: 100px;">
                            <h1 style="font-size: 36px; margin-bottom: 20px;">✨ 招募结果</h1>
                            <div id="summon-result" style="font-size: 24px; margin: 20px;"></div>
                            <button class="btn btn-success" onclick="doSummon()" style="margin-top: 20px;">🎴 招募一次 (消耗 100 元宝)</button>
                            <button class="btn btn-primary" onclick="backToHome()" style="margin-top: 20px;">✅ 确定</button>
                        </div>
                    </div>
                `;
            },
            
            render() {
                if (!this.ctx) return;
                this.ctx.fillStyle = '#1a1a2e';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }
        };
        
        function startBattle() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('battle-screen').classList.add('active');
            setTimeout(() => {
                alert('⚔️ 战斗胜利！\n获得 💰50 金币');
                Game.player.gold += 50;
            }, 500);
        }
        
        function showSummon() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('summon-screen').classList.add('active');
        }
        
        function doSummon() {
            if (Game.player.gem >= 100) {
                Game.player.gem -= 100;
                const heroes = ['赵累', '廖化', '仓亭', '赵云', '马超', '关羽', '张飞'];
                const hero = heroes[Math.floor(Math.random() * heroes.length)];
                document.getElementById('summon-result').innerHTML = `🎉 获得武将：<b style="color: #E91E63; font-size: 32px;">${hero}</b>`;
                Game.player.heroes.push({ name: hero });
            } else {
                alert('❌ 元宝不足！需要 100 元宝');
            }
        }
        
        function showHeroList() {
            let list = Game.player.heroes.map((h, i) => `${i+1}. ${h.name} (Lv.${h.level || 1})`).join('<br>');
            alert(`👥 武将列表 (${Game.player.heroes.length}人):\n\n${list || '暂无武将'}`);
        }
        
        function backToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('summon-result').innerHTML = '';
        }
        
        function showHelp() {
            alert(`📖 玩法说明\n\n⚔️ 战斗系统\n点击快速战斗获得金币\n\n🎴 招募武将\n消耗元宝抽取武将\n\n👥 武将培养\n升级提升属性\n\n🔄 重新开始\n刷新页面即可`);
        }
        
        // 初始化
        window.onload = () => Game.init();
        window.onresize = () => Game.resize();
    </script>
</body>
</html>
